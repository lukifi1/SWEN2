<div class="panel-header">
  <h2>Tour Details</h2>
  <div class="button-row">
    <app-action-button label="Edit Tour" variant="secondary" (buttonClick)="editTour.emit()"></app-action-button>
    <app-action-button label="Delete Tour" variant="danger" (buttonClick)="deleteTour.emit()"></app-action-button>
  </div>
</div>

<div class="details-grid">
  <div class="details-card">
    <img [src]="tour.image" [alt]="tour.name" class="detail-image" />
    <h3>{{ tour.name }}</h3>
    <p>{{ tour.description }}</p>
    <ul class="detail-list">
      <li><strong>From:</strong> {{ tour.from }} | <strong>To:</strong> {{ tour.to }}</li>
      <li><strong>Distance:</strong> {{ tour.distance }} km | <strong>Time:</strong> {{ tour.estimatedTime }} h</li>
    </ul>
  </div>
  <div class="details-card">
    <h3>Map</h3>
    <div class="map-container card">
      <div id="map"></div>
    </div>
  </div>
</div>

<app-tour-logs [logs]="tour.logs" (logsChange)="updateLogs($event)"></app-tour-logs>

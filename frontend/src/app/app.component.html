<div class="app-shell">
  <header class="header">
    <div class="container header-main">
      <a class="brand" routerLink="/tours">
        <h1>TourPlanner</h1>
        <p>Plan, manage and review your personal tours.</p>
      </a>

      @if (auth.isAuthenticated()) {
        <nav class="auth-menu">
          <a routerLink="/tours" routerLinkActive="active" class="nav-link">Tours</a>
          <a routerLink="/stats" routerLinkActive="active" class="nav-link">Statistics</a>
          <span class="user-chip">{{ auth.username() }}</span>
          <app-action-button label="Logout" variant="secondary" (buttonClick)="logout()">
          </app-action-button>
        </nav>
      }
    </div>
  </header>

  <main class="container main-content">
    <router-outlet></router-outlet>
  </main>
</div>

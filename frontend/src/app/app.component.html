<div class="layout">

  <!-- LEFT -->
  <app-tours
    [tours]="tours"
    [selectedTour]="selectedTour"
    (select)="selectTour($event)"
    (create)="openCreateTourForm()">
  </app-tours>

  <!-- RIGHT -->
  <app-tour-detail
    [tour]="selectedTour"
    (edit)="openEditTourForm()"
    (delete)="deleteTour()">
  </app-tour-detail>

  <app-tour-form
    *ngIf="showTourForm"
    [tour]="tourForm"
    [editMode]="editMode"
    (save)="saveTour($event)"
    (cancel)="cancelTourForm()">
  </app-tour-form>

</div>

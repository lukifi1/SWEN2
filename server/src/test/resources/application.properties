# Test configuration: uses an in-memory H2 database and dummy secrets so that
# Spring-context tests run without a real PostgreSQL instance or a populated .env.
spring.datasource.url=jdbc:h2:mem:tourplanner;DB_CLOSE_DELAY=-1;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false

tourplanner.jwt.secret=test-secret-key-for-junit-tests-please-min-32-chars
tourplanner.jwt.expiration-ms=3600000
tourplanner.ors.base-url=http://localhost:9999
tourplanner.ors.api-key=test-ors-key
tourplanner.image.base-path=${java.io.tmpdir}/tourplanner-test-images
tourplanner.cors.allowed-origins=http://localhost:4200

spring.application.name=tourplanner

# ---- Database connection (values come from the environment / .env, never hard-coded) ----
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# ---- JPA / Hibernate ----
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.format_sql=true

# ---- File uploads (tour images) ----
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# ---- Server ----
server.port=8080

# ---- Application specific configuration (bound by TourPlannerProperties) ----
tourplanner.jwt.secret=${JWT_SECRET}
tourplanner.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
tourplanner.ors.base-url=${OPENROUTE_BASE_URL:https://api.openrouteservice.org}
tourplanner.ors.api-key=${OPENROUTE_API_KEY:}
tourplanner.image.base-path=${IMAGE_BASE_PATH}
tourplanner.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}
